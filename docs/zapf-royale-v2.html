<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>ZAPF ROYALE — PvP Bierzapfen auf Solana</title>
<link href="https://fonts.googleapis.com/css2?family=Alfa+Slab+One&family=Outfit:wght@400;600;800&family=JetBrains+Mono:wght@600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#100B07; --chalk:#EDE7D8; --chalk-dim:#9b9284;
    --brass:#D6A644; --brass-deep:#8F6A1E;
    --foamc:#FFF6E0; --good:#7BC96F; --bad:#E05555;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{height:100%;overflow:hidden}
  body{
    background:
      radial-gradient(220px 160px at 12% 18%, rgba(255,170,60,.10), transparent 70%),
      radial-gradient(180px 140px at 88% 12%, rgba(255,140,40,.08), transparent 70%),
      radial-gradient(260px 200px at 78% 55%, rgba(255,190,90,.05), transparent 70%),
      radial-gradient(1400px 700px at 50% -12%, #2a1c0e 0%, transparent 60%),
      var(--bg);
    color:var(--chalk);font-family:'Outfit',sans-serif;
    user-select:none;-webkit-user-select:none;
    display:flex;flex-direction:column;align-items:center;
  }
  header{width:100%;max-width:520px;padding:12px 18px 4px;display:flex;align-items:center;justify-content:space-between}
  .logo{font-family:'Alfa Slab One',serif;font-size:1.1rem;color:var(--brass)}
  .logo small{display:block;font-family:'Outfit';font-weight:600;font-size:.55rem;color:var(--chalk-dim);letter-spacing:2.5px;margin-top:2px}
  .pot{font-family:'JetBrains Mono',monospace;font-size:.78rem;color:var(--foamc);
    background:linear-gradient(180deg,#3a2a15,#2a1d0e);border:1px solid var(--brass-deep);
    border-radius:999px;padding:6px 13px}
  .pot b{color:var(--brass)}
  .players{width:100%;max-width:520px;padding:4px 18px 0;display:flex;gap:6px}
  .chip{flex:1;text-align:center;font-family:'JetBrains Mono',monospace;font-size:.56rem;color:var(--chalk-dim);
    background:rgba(29,22,16,.8);border:1px solid #35281a;border-radius:8px;padding:5px 2px;overflow:hidden;white-space:nowrap}
  .chip.me{color:var(--foamc);border-color:var(--brass);background:rgba(42,31,16,.9)}
  .chip .st{display:block;font-size:.5rem;margin-top:2px;color:var(--chalk-dim)}
  .chip.me .st{color:var(--brass)}

  .hud{width:100%;max-width:520px;padding:6px 22px 0;display:flex;align-items:center;justify-content:space-between}
  .target-hud .lbl{font-weight:600;font-size:.58rem;letter-spacing:3px;color:var(--chalk-dim)}
  .target-hud .val{font-family:'Alfa Slab One',serif;font-size:1.9rem;color:var(--chalk);line-height:1.05;text-shadow:0 0 20px rgba(237,231,216,.18)}
  .gauge-wrap{text-align:center}
  .gauge-wrap .lbl{font-weight:600;font-size:.52rem;letter-spacing:2px;color:var(--chalk-dim);margin-top:2px}

  .stage{position:relative;width:min(92vw,340px);flex:1;min-height:0;display:flex;justify-content:center}
  .stage svg{height:100%;width:auto;max-width:100%;touch-action:none}

  .controls{width:100%;max-width:520px;padding:2px 18px 18px;text-align:center}
  .hold-btn{
    width:100%;max-width:340px;padding:17px;border:none;border-radius:16px;cursor:pointer;
    font-family:'Alfa Slab One',serif;font-size:1.05rem;letter-spacing:1px;color:#1a120b;
    background:linear-gradient(180deg,#f2d78c,var(--brass) 55%,var(--brass-deep));
    box-shadow:0 5px 0 #5e4413, 0 8px 18px rgba(0,0,0,.5);
    transition:transform .08s, box-shadow .08s;touch-action:none;
  }
  .hold-btn:active,.hold-btn.down{transform:translateY(4px);box-shadow:0 1px 0 #5e4413,0 4px 10px rgba(0,0,0,.5)}
  .hold-btn:disabled{filter:grayscale(.7) brightness(.6);cursor:default;transform:none}
  .hint{margin-top:8px;font-size:.68rem;font-weight:600;letter-spacing:2px;color:var(--chalk-dim)}

  .overlay{position:fixed;inset:0;z-index:50;display:flex;align-items:center;justify-content:center;
    background:rgba(8,5,3,.8);backdrop-filter:blur(7px);opacity:0;pointer-events:none;transition:opacity .35s}
  .overlay.show{opacity:1;pointer-events:auto}
  .card{width:min(88vw,360px);text-align:center;padding:30px 26px 24px;border-radius:20px;
    background:linear-gradient(180deg,#2b1f12,#1d1610);border:1px solid var(--brass-deep);
    box-shadow:0 20px 60px rgba(0,0,0,.7);transform:scale(.9);transition:transform .35s cubic-bezier(.34,1.56,.64,1)}
  .overlay.show .card{transform:scale(1)}
  .verdict{font-family:'Alfa Slab One',serif;font-size:1.6rem;color:var(--brass);line-height:1.1}
  .acc{font-family:'JetBrains Mono',monospace;font-size:2.9rem;font-weight:600;margin:12px 0 2px;color:var(--foamc)}
  .detail{font-family:'JetBrains Mono',monospace;font-size:.76rem;color:var(--chalk-dim)}
  .detail b{color:var(--chalk)}
  .again{margin-top:20px;width:100%;padding:14px;border:none;border-radius:12px;cursor:pointer;
    font-family:'Alfa Slab One',serif;font-size:.95rem;color:#1a120b;
    background:linear-gradient(180deg,#f2d78c,var(--brass) 55%,var(--brass-deep));box-shadow:0 4px 0 #5e4413}
  .again:active{transform:translateY(3px);box-shadow:0 1px 0 #5e4413}
</style>
</head>
<body>

<header>
  <div class="logo">ZAPF ROYALE<small>PVP · SOLANA</small></div>
  <div class="pot">POT <b>0.50 ◎</b></div>
</header>
<div class="players" id="players"></div>

<div class="hud">
  <div class="target-hud">
    <div class="lbl">ZIEL</div>
    <div class="val" id="targetVal">1,0 L</div>
  </div>
  <div class="gauge-wrap">
    <svg width="74" height="52" viewBox="0 0 74 52">
      <path d="M8 48 A32 32 0 0 1 66 48" fill="none" stroke="#3a2d1c" stroke-width="7" stroke-linecap="round"/>
      <path d="M8 48 A32 32 0 0 1 66 48" fill="none" stroke="url(#gaugeGrad)" stroke-width="4" stroke-linecap="round"/>
      <g id="needle" transform="rotate(0 37 48)">
        <line x1="37" y1="48" x2="37" y2="20" stroke="#EDE7D8" stroke-width="2.5" stroke-linecap="round"/>
      </g>
      <circle cx="37" cy="48" r="4.5" fill="#D6A644"/>
      <defs>
        <linearGradient id="gaugeGrad" x1="0" y1="0" x2="1" y2="0">
          <stop offset="0" stop-color="#7BC96F"/><stop offset=".55" stop-color="#D6A644"/><stop offset="1" stop-color="#E05555"/>
        </linearGradient>
      </defs>
    </svg>
    <div class="lbl">FASSDRUCK <span id="barVal" style="color:var(--chalk)">1.6 BAR</span></div>
  </div>
</div>

<div class="stage" id="stage">
<svg id="scene" viewBox="0 0 320 560" preserveAspectRatio="xMidYMid meet">
  <defs>
    <!-- chrome tower -->
    <linearGradient id="chrome" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#5a5a60"/><stop offset=".18" stop-color="#e9edf2"/>
      <stop offset=".42" stop-color="#9aa0aa"/><stop offset=".55" stop-color="#f4f7fb"/>
      <stop offset=".78" stop-color="#7d838d"/><stop offset="1" stop-color="#3c3c42"/>
    </linearGradient>
    <linearGradient id="brassG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f2d78c"/><stop offset=".5" stop-color="#D6A644"/><stop offset="1" stop-color="#8F6A1E"/>
    </linearGradient>
    <radialGradient id="badgeG" cx=".38" cy=".32" r=".9">
      <stop offset="0" stop-color="#fbe7ae"/><stop offset=".55" stop-color="#D6A644"/><stop offset="1" stop-color="#7a5a18"/>
    </radialGradient>
    <!-- beer -->
    <linearGradient id="beerG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFC94D"/><stop offset=".45" stop-color="#E89B1C"/><stop offset="1" stop-color="#9C5A08"/>
    </linearGradient>
    <linearGradient id="beerEdge" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="rgba(60,30,0,.38)"/><stop offset=".12" stop-color="rgba(0,0,0,0)"/>
      <stop offset=".88" stop-color="rgba(0,0,0,0)"/><stop offset="1" stop-color="rgba(60,30,0,.38)"/>
    </linearGradient>
    <linearGradient id="foamG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFFDF5"/><stop offset="1" stop-color="#F0E2BE"/>
    </linearGradient>
    <linearGradient id="streamG" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="rgba(255,201,77,.35)"/><stop offset=".5" stop-color="#FFD98A"/><stop offset="1" stop-color="rgba(255,201,77,.35)"/>
    </linearGradient>
    <!-- glass -->
    <linearGradient id="glassBody" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="rgba(210,225,235,.22)"/><stop offset=".1" stop-color="rgba(210,225,235,.05)"/>
      <stop offset=".46" stop-color="rgba(210,225,235,.02)"/><stop offset=".62" stop-color="rgba(255,255,255,.09)"/>
      <stop offset=".9" stop-color="rgba(210,225,235,.05)"/><stop offset="1" stop-color="rgba(210,225,235,.26)"/>
    </linearGradient>
    <linearGradient id="glassShine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="rgba(255,255,255,.5)"/><stop offset="1" stop-color="rgba(255,255,255,.04)"/>
    </linearGradient>
    <radialGradient id="dropG" cx=".35" cy=".3" r=".9">
      <stop offset="0" stop-color="rgba(255,255,255,.75)"/><stop offset=".5" stop-color="rgba(220,235,245,.28)"/><stop offset="1" stop-color="rgba(220,235,245,.05)"/>
    </radialGradient>
    <clipPath id="glassInner">
      <path d="M104,176 L216,176 L210,500 L110,500 Z"/>
    </clipPath>
    <filter id="softBlur" x="-40%" y="-40%" width="180%" height="180%"><feGaussianBlur stdDeviation="1.1"/></filter>
  </defs>

  <!-- ══ ZAPFSÄULE ══ -->
  <g id="tower">
    <!-- handle (pivot at 160,26) -->
    <g id="handle" transform="rotate(0 160 26)" style="transition:transform .18s cubic-bezier(.34,1.56,.64,1)">
      <rect x="156.5" y="-22" width="7" height="48" rx="3.5" fill="url(#chrome)"/>
      <rect x="149" y="-52" width="22" height="40" rx="11" fill="#15100c" stroke="#4a3826" stroke-width="1"/>
      <rect x="152.5" y="-48" width="5" height="30" rx="2.5" fill="rgba(255,255,255,.10)"/>
      <text x="160" y="-27" text-anchor="middle" font-family="Alfa Slab One" font-size="9" fill="#D6A644">ZR</text>
    </g>
    <!-- tower column -->
    <rect x="142" y="18" width="36" height="76" rx="16" fill="url(#chrome)"/>
    <rect x="147" y="22" width="6" height="66" rx="3" fill="rgba(255,255,255,.35)"/>
    <!-- brass collar -->
    <rect x="138" y="60" width="44" height="12" rx="6" fill="url(#brassG)"/>
    <!-- badge -->
    <circle cx="160" cy="44" r="17" fill="url(#badgeG)" stroke="#6e5216" stroke-width="1.5"/>
    <circle cx="160" cy="44" r="12.5" fill="#20160c"/>
    <text x="160" y="41.5" text-anchor="middle" font-family="Alfa Slab One" font-size="7" fill="#EDE7D8">ZAPF</text>
    <text x="160" y="50.5" text-anchor="middle" font-family="Alfa Slab One" font-size="7" fill="#D6A644">ROYALE</text>
    <!-- spout -->
    <path d="M152,88 L168,88 L166,106 Q166,112 160,112 Q154,112 154,106 Z" fill="url(#chrome)"/>
    <ellipse cx="160" cy="111" rx="5" ry="2" fill="#2a2a2e"/>
  </g>

  <!-- ══ BIERSTRAHL ══ -->
  <g id="streamGroup" opacity="0">
    <path id="streamPath" fill="url(#streamG)"/>
    <g id="splash"></g>
  </g>

  <!-- ══ MASSKRUG ══ -->
  <g id="krug">
    <!-- shadow on counter -->
    <ellipse cx="160" cy="526" rx="78" ry="10" fill="rgba(0,0,0,.5)" filter="url(#softBlur)"/>
    <!-- handle of the krug -->
    <path d="M216,230 Q268,236 268,320 Q268,404 212,414" fill="none" stroke="url(#glassBody)" stroke-width="20" stroke-linecap="round"/>
    <path d="M216,230 Q268,236 268,320 Q268,404 212,414" fill="none" stroke="rgba(255,255,255,.22)" stroke-width="4" stroke-linecap="round"/>

    <!-- CONTENT (clipped) -->
    <g clip-path="url(#glassInner)">
      <path id="liquid" fill="url(#beerG)"/>
      <path id="liquidEdge" fill="url(#beerEdge)"/>
      <g id="bubbles"></g>
      <path id="foam" fill="url(#foamG)"/>
    </g>

    <!-- glass body over content -->
    <path d="M96,170 L224,170 L217,506 Q217,514 209,514 L111,514 Q103,514 103,506 Z"
          fill="url(#glassBody)" stroke="rgba(230,240,250,.35)" stroke-width="2.5"/>
    <!-- thick base -->
    <path d="M107,486 L213,486 L211,506 Q211,512 204,512 L116,512 Q109,512 109,506 Z" fill="rgba(220,235,245,.14)"/>
    <!-- rim -->
    <ellipse cx="160" cy="170" rx="64" ry="5" fill="none" stroke="rgba(255,255,255,.4)" stroke-width="2"/>
    <!-- vertical shine -->
    <rect x="122" y="185" width="10" height="300" rx="5" fill="url(#glassShine)" opacity=".5"/>
    <rect x="196" y="195" width="5" height="270" rx="2.5" fill="url(#glassShine)" opacity=".3"/>
    <!-- condensation -->
    <g id="condensation" opacity="0" style="transition:opacity 1.2s"></g>

    <!-- etched marks -->
    <g id="marks" font-family="JetBrains Mono" font-size="11" font-weight="600"></g>
  </g>

  <!-- wooden counter -->
  <rect x="0" y="520" width="320" height="40" fill="#241a10"/>
  <rect x="0" y="520" width="320" height="4" fill="rgba(214,166,68,.3)"/>
  <rect x="0" y="527" width="320" height="1.5" fill="rgba(0,0,0,.35)"/>
  <rect x="0" y="540" width="320" height="1.5" fill="rgba(0,0,0,.3)"/>
</svg>
</div>

<div class="controls">
  <button class="hold-btn" id="holdBtn">GEDRÜCKT HALTEN ZUM ZAPFEN</button>
  <div class="hint">1 VERSUCH · LOSLASSEN = ABGABE</div>
</div>

<div class="overlay" id="overlay">
  <div class="card">
    <div class="verdict" id="verdict">SAUBER GEZAPFT!</div>
    <div class="acc" id="acc">97.4%</div>
    <div class="detail">Gezapft <b id="resPour">0,98 L</b> · Ziel <b id="resTarget">1,0 L</b></div>
    <div class="detail" style="margin-top:6px" id="waitLine">Warten auf 4 Spieler …</div>
    <button class="again" id="againBtn">NOCHMAL (DEMO)</button>
  </div>
</div>

<script>
(function(){
  "use strict";
  const CAP = 1600;                 // ml Krug-Kapazität
  const INNER_TOP = 176, INNER_BOT = 500, INNER_H = INNER_BOT-INNER_TOP;
  const MARKS = [500,1000,1500];
  const BASE_RATE = 520;            // ml/s bei 1.0 Druckfaktor
  const reduceMotion = matchMedia('(prefers-reduced-motion: reduce)').matches;
  const NS = 'http://www.w3.org/2000/svg';

  const $ = id=>document.getElementById(id);
  const liquid=$('liquid'), liquidEdge=$('liquidEdge'), foamEl=$('foam'),
        streamGroup=$('streamGroup'), streamPath=$('streamPath'),
        splashG=$('splash'), bubblesG=$('bubbles'), marksG=$('marks'),
        condG=$('condensation'), handle=$('handle'), btn=$('holdBtn'),
        stage=$('stage'), overlay=$('overlay');

  let target=1000, pressure=1, fill=0, foamMl=0;
  let pouring=false, locked=false, lastT=0, time=0, waveAmp=0;
  let bubbles=[], splashes=[];

  // lobby
  const wallets=['7xKq…F2ah','3mPz…9dQw','Gh5t…LLc1','9aRe…x0Vn','Bk2u…77mE'];
  $('players').innerHTML = wallets.map((w,i)=>
    `<div class="chip${i===0?' me':''}">${w}<span class="st">${i===0?'DU BIST DRAN':'wartet'}</span></div>`).join('');

  const yForMl = ml => INNER_BOT - (ml/CAP)*INNER_H;
  const fmtL = ml => (ml/1000).toFixed(ml%500===0?1:2).replace('.',',')+' L';

  // condensation droplets (static positions)
  (function makeDrops(){
    for(let i=0;i<26;i++){
      const c=document.createElementNS(NS,'circle');
      const y=210+Math.random()*270;
      const spread=52-((y-INNER_TOP)/INNER_H)*4;
      c.setAttribute('cx',160+(Math.random()*2-1)*spread);
      c.setAttribute('cy',y);
      c.setAttribute('r',(1+Math.random()*2.4).toFixed(1));
      c.setAttribute('fill','url(#dropG)');
      condG.appendChild(c);
    }
  })();

  function drawMarks(){
    marksG.innerHTML='';
    MARKS.forEach(ml=>{
      const y=yForMl(ml), active = ml===target;
      const line=document.createElementNS(NS,'line');
      line.setAttribute('x1',108); line.setAttribute('x2',active?212:150);
      line.setAttribute('y1',y); line.setAttribute('y2',y);
      line.setAttribute('stroke',active?'#EDE7D8':'rgba(230,240,250,.42)');
      line.setAttribute('stroke-width',active?2.4:1.6);
      if(active){line.setAttribute('stroke-dasharray','7 5');
        line.setAttribute('style','filter:drop-shadow(0 0 5px rgba(237,231,216,.7))');}
      marksG.appendChild(line);
      const t=document.createElementNS(NS,'text');
      t.setAttribute('x',active?176:156); t.setAttribute('y',y-5);
      t.setAttribute('fill',active?'#EDE7D8':'rgba(230,240,250,.5)');
      if(active) t.setAttribute('font-size','13');
      t.textContent=(ml/1000).toFixed(1).replace('.',',')+' L';
      marksG.appendChild(t);
    });
  }

  function wavePath(surfY, amp){
    let d=`M92,${INNER_BOT+10} L92,${(surfY+amp*Math.sin(time*3)).toFixed(1)} `;
    for(let x=92;x<=228;x+=8){
      const y=surfY + Math.sin(x*0.09 + time*4)*amp + Math.sin(x*0.045 - time*2.6)*amp*0.6;
      d+=`L${x},${y.toFixed(1)} `;
    }
    d+=`L228,${INNER_BOT+10} Z`;
    return d;
  }

  function render(){
    const beerTop = yForMl(Math.min(fill,CAP));
    const foamPx = Math.min((foamMl/CAP)*INNER_H, 74);
    const foamTop = beerTop - foamPx;

    liquid.setAttribute('d', wavePath(beerTop, waveAmp));
    liquidEdge.setAttribute('d', wavePath(beerTop, waveAmp));

    // foam: blobby top edge
    if(foamPx>1){
      let d=`M92,${beerTop+4} L92,${foamTop+3} `;
      for(let x=92;x<=228;x+=13){
        const r=5+((x*7)%5);
        d+=`Q${x+6.5},${foamTop-r+Math.sin(x*0.3+time*1.4)*1.6} ${x+13},${foamTop+3} `;
      }
      d+=`L228,${beerTop+4} Z`;
      foamEl.setAttribute('d',d);
    } else foamEl.setAttribute('d','');

    // stream
    if(pouring){
      const tipY=112, endY=foamTop-2;
      const wob=Math.sin(time*26)*1.4;
      const wTop=4.6*Math.sqrt(pressure), wBot=wTop*0.62;
      streamPath.setAttribute('d',
        `M${160-wTop},${tipY} L${160+wTop},${tipY} `+
        `Q${160+wBot+wob},${(tipY+endY)/2} ${160+wBot+wob},${endY} `+
        `L${160-wBot+wob},${endY} Q${160-wBot+wob},${(tipY+endY)/2} ${160-wTop},${tipY} Z`);
    }

    // condensation appears once glass is cold & filling
    condG.style.opacity = fill>CAP*0.18 ? .9 : 0;
  }

  function spawnBubble(){
    if(reduceMotion || fill<40) return;
    const c=document.createElementNS(NS,'circle');
    const sites=[125,143,160,178,196];
    const x=sites[Math.floor(Math.random()*sites.length)]+(Math.random()*8-4);
    const r=0.8+Math.random()*1.9;
    c.setAttribute('r',r.toFixed(1)); c.setAttribute('cx',x);
    c.setAttribute('cy',INNER_BOT-4);
    c.setAttribute('fill','rgba(255,246,224,.55)');
    bubblesG.appendChild(c);
    bubbles.push({el:c,x,y:INNER_BOT-4,v:26+Math.random()*36,drift:Math.random()*2-1});
  }

  function spawnSplash(y){
    if(reduceMotion) return;
    for(let i=0;i<2;i++){
      const c=document.createElementNS(NS,'circle');
      c.setAttribute('r',(1+Math.random()*1.6).toFixed(1));
      c.setAttribute('fill','rgba(255,246,224,.85)');
      splashG.appendChild(c);
      splashes.push({el:c,x:160+(Math.random()*10-5),y,vx:(Math.random()*2-1)*46,vy:-(30+Math.random()*55),life:.5});
    }
  }

  function loop(t){
    if(!lastT) lastT=t;
    const dt=Math.min((t-lastT)/1000,.05); lastT=t; time+=dt;

    if(pouring && !locked){
      fill += BASE_RATE*pressure*dt;
      foamMl += 34*Math.pow(pressure,1.6)*dt;
      waveAmp = Math.min(waveAmp+dt*8, 2.6);
      if(Math.random()<0.8) spawnBubble();
      spawnSplash(yForMl(Math.min(fill,CAP)) - Math.min((foamMl/CAP)*INNER_H,74));
      if(fill+foamMl*0.7 >= CAP*1.01) endPour(true);
    } else {
      waveAmp = Math.max(waveAmp-dt*1.8, 0.35);
    }

    // bubbles physics
    const surfY = yForMl(Math.min(fill,CAP));
    bubbles=bubbles.filter(b=>{
      b.y-=b.v*dt; b.x+=b.drift*dt*8;
      if(b.y<=surfY+3){b.el.remove();return false;}
      b.el.setAttribute('cy',b.y.toFixed(1)); b.el.setAttribute('cx',b.x.toFixed(1));
      return true;
    });
    splashes=splashes.filter(s=>{
      s.life-=dt; if(s.life<=0){s.el.remove();return false;}
      s.vy+=280*dt; s.x+=s.vx*dt; s.y+=s.vy*dt;
      s.el.setAttribute('cx',s.x.toFixed(1)); s.el.setAttribute('cy',s.y.toFixed(1));
      s.el.setAttribute('opacity',(s.life*2).toFixed(2));
      return true;
    });

    render();
    requestAnimationFrame(loop);
  }

  function newRound(){
    target = MARKS[Math.floor(Math.random()*3)];
    pressure = 0.8 + Math.random()*0.5;            // 0.8–1.3
    fill=0; foamMl=0; locked=false; pouring=false; waveAmp=0;
    bubbles.forEach(b=>b.el.remove()); bubbles=[];
    splashes.forEach(s=>s.el.remove()); splashes=[];
    $('targetVal').textContent = fmtL(target);
    $('barVal').textContent = (pressure*1.5).toFixed(1)+' BAR';
    $('needle').setAttribute('transform',`rotate(${((pressure-1.05)/0.25)*58} 37 48)`);
    drawMarks();
    streamGroup.setAttribute('opacity',0);
    btn.disabled=false; btn.textContent='GEDRÜCKT HALTEN ZUM ZAPFEN';
    overlay.classList.remove('show');
    condG.style.opacity=0;
    render();
  }

  function startPour(){
    if(locked||pouring) return;
    pouring=true;
    handle.setAttribute('transform','rotate(-46 160 26)');
    streamGroup.setAttribute('opacity',1);
    btn.classList.add('down'); btn.textContent='ZAPFT …';
    if(navigator.vibrate && !reduceMotion) navigator.vibrate(10);
  }

  function endPour(overflow=false){
    if(!pouring||locked) return;
    pouring=false; locked=true;
    handle.setAttribute('transform','rotate(0 160 26)');
    streamGroup.setAttribute('opacity',0);
    btn.classList.remove('down'); btn.disabled=true; btn.textContent='ABGEGEBEN';
    setTimeout(()=>showResult(overflow), 650);
  }

  function showResult(overflow){
    const poured=Math.round(fill);
    const diff=Math.abs(poured-target);
    const acc=overflow?0:Math.max(0,100-(diff/target)*100);
    let v;
    if(overflow) v='ÜBERGELAUFEN!';
    else if(acc>=99.2) v='PERFEKT GEZAPFT!';
    else if(acc>=96) v='SAUBER GEZAPFT!';
    else if(acc>=88) v='NICHT SCHLECHT';
    else v='DANEBEN …';
    $('verdict').textContent=v;
    $('verdict').style.color = acc>=96?'var(--good)':(acc<60?'var(--bad)':'var(--brass)');
    $('acc').textContent=acc.toFixed(1)+'%';
    $('resPour').textContent = overflow?'> 1,6 L':fmtL(poured);
    $('resTarget').textContent = fmtL(target);
    overlay.classList.add('show');
    if(navigator.vibrate && !reduceMotion) navigator.vibrate(acc>=96?[30,40,30]:60);
  }

  const down=e=>{e.preventDefault();startPour();};
  const up=e=>{if(pouring){e.preventDefault();endPour();}};
  btn.addEventListener('pointerdown',down);
  stage.addEventListener('pointerdown',down);
  window.addEventListener('pointerup',up);
  window.addEventListener('pointercancel',up);
  window.addEventListener('blur',()=>pouring&&endPour());
  $('againBtn').addEventListener('click',newRound);

  newRound();
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
